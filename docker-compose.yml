version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: find-my-nuts:latest
    container_name: find-my-nuts-container
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-AIzaSyCIFMDKHrjxS7Q1UO51n5hO5KXvAnoOwWQ}
      - APP_URL=${APP_URL:-http://localhost:3000}
    restart: always
